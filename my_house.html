<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My House</title>
    
    <style>
        .house-container {
            margin: auto;
            position: relative;
            width: 200px;
        }
        .chimney {
            width: 30px;
            height: 140px;
            background-color: #555;
            position: absolute;
            top: 5%;
            right: 10%;
            /* Чтобы дымоход был позади крыши */
            z-index: 1;
        }
        .roof {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 200px solid #2c2c2c;
            position: relative;
            /* Чтобы крыша была впереди вымохода */
            z-index: 2;
        }
        .walls {
            width: 200px;
            height: 300px;
            background-color: #3a3a3a;
            /* Чтобы margin-top у .window не выходил за пределы .walls */
            overflow: hidden;
            /* Чтобы выровнять .door */
            position: relative; 
        }
        .window {
            margin: auto;
            margin-top: 25px;
            width: 80px;
            height: 100px;
            background-color: #c9b458;
            border-radius: 50%;
            /* Чтобы сделать ставни */
            position: relative;
        }
        .window::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            margin-top: 50px;
            background-color: #2c2c2c;
        }
        .window::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 100%;
            /* Чтобы выровнять по центру вертикальную полоску для ставней */
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c2c2c;
        }
        .door {
            background-color: #3b2314;
            position: absolute;
            bottom: 0;
            height: 100px;
            width: 65px;
            /* Чтобы выровнять дверь по центру */
            left: 50%;
            transform: translateX(-50%);
        }
        .door-handle {
            background-color: #c9b458;
            position: absolute;
            top: 50%;
            right: 15%;
            border-radius: 50%;
            width: 15px;
            height: 15px;
        }
    </style>
</head>
<body>
    <h1>Gothic house</h1>
    <div class="house-container">
        <div class="chimney"></div>
        <div class="roof"></div>
        <div class="walls">
            <div class="window"></div>
            <div class="door">
                <div class="door-handle"></div>
            </div>
        </div>
    </div>
</body>
</html>
